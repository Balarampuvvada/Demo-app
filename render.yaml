# Render Deployment Configuration
# 
# IMPORTANT: Update the URLs below with your actual Render service URLs after first deployment:
# 1. Deploy backend first, get the URL (e.g., https://security-patrol-backend.onrender.com)
# 2. Update CORS_ORIGIN in backend envVars with the frontend URL
# 3. Update VITE_API_URL in frontend dockerCommand with the backend URL
# 4. Update BACKEND_URL in frontend envVars with the backend URL
# 5. Redeploy both services
#
# The dockerCommand uses build arguments to:
# - BUILD_ENV=production: Tells Dockerfile to use production stage
# - VITE_API_URL: Injects backend URL during frontend build
#
services:
  # PostgreSQL Database
  - type: pserv
    name: security-patrol-db
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile # Not used, managed database
    envVars:
      - key: POSTGRES_USER
        value: patrol_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: security_patrol

  # Backend API
  - type: web
    name: security-patrol-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: security-patrol-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://frontend-hrqz.onrender.com

  # Frontend
  - type: web
    name: security-patrol-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    envVars:
      - key: VITE_API_URL
        value: https://security-patrol-backend-gvqc.onrender.com
      - key: BACKEND_URL
        value: https://security-patrol-backend-gvqc.onrender.com

databases:
  - name: security-patrol-db
    databaseName: security_patrol
    user: patrol_user
    plan: starter

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: security-patrol-db
    environment:
      POSTGRES_USER: patrol_user
      POSTGRES_PASSWORD: patrol_pass
      POSTGRES_DB: security_patrol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patrol_user -d security_patrol"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security-patrol-backend
    environment:
      DATABASE_URL: postgresql://patrol_user:patrol_pass@postgres:5432/security_patrol
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 5000
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: security-patrol-frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
